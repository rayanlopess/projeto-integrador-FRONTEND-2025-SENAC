<ion-toolbar>
  <ion-buttons slot="start">
    <ion-back-button default-href="/login"></ion-back-button>
  </ion-buttons>
  <ion-title>Recuperação de Senha</ion-title>
</ion-toolbar>

<ion-content [fullscreen]="true">
 
  <ion-grid class="container">
    <ion-row>
      <ion-col>
        <ion-card>
          <ion-card-header>
            <ion-img id="img-logo" src="../../../assets/images/brunch-logo-light.png"></ion-img>
            <div class="headers">
              <ion-card-title class="titulo-card">Recuperação de Senha!</ion-card-title>
              <ion-card-subtitle>Informe um email e enviaremos um link para recuperação da sua senha.</ion-card-subtitle>
            </div>
          </ion-card-header>

          <ion-card-content>
            <form action="">
            <ion-grid>
              

              <ion-row class="espacamento">
                <ion-col>
                  <div class="input-barra">
                    <div class="input-texto">
                      <div class="icon-pessoa">
                        <ion-buttons>
                          <ion-button>
                            <ion-icon class="icon" name="mail"></ion-icon>
                          </ion-button>
                        </ion-buttons>
                      </div>
                      <div class="wave-group">
                        <input required="" type="text" class="input-tecido">
                        <label class="label">
                          <span class="label-char" style="--index: 0">E</span>
                          <span class="label-char" style="--index: 1">-</span>
                          <span class="label-char" style="--index: 2">m</span>
                          <span class="label-char" style="--index: 3">a</span>
                          <span class="label-char" style="--index: 5">i</span>
                          <span class="label-char" style="--index: 6">l</span>

                        </label>
                      </div>
                    </div>
                    <span class="bar"></span>
                  </div>
                </ion-col>
              </ion-row>

              
              <ion-row>
                <ion-col>
                  <div class="div-btEntrar">
                    <ion-button type="submit" class="btEntrar">Enviar</ion-button>
                  </div>
                </ion-col>
              </ion-row>

            
            </ion-grid>
              </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
