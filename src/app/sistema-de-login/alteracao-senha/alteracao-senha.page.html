<ion-toolbar>
  <ion-buttons slot="start">
    <ion-back-button default-href="/login"></ion-back-button>
  </ion-buttons>
  <ion-title>Recuperação de Senha</ion-title>
</ion-toolbar>

<ion-content [fullscreen]="true">
 
  <ion-grid class="container">
    <ion-row>
      <ion-col>
        <ion-card>
          <ion-card-header>
            <ion-img id="img-logo" src="../../../assets/images/brunch-logo-light.png"></ion-img>
            <div class="headers">
              <ion-card-title class="titulo-card">Alterar Senha!</ion-card-title>
              <ion-card-subtitle>Informe sua nova senha de acesso ao Brunch.</ion-card-subtitle>
            </div>
          </ion-card-header>

          <ion-card-content>
            <form action="">
            <ion-grid>
              

              <ion-row class="espacamento">
                <ion-col>
                  <div class="input-barra">
                    <div class="input-texto">
                      <div class="icon-pessoa">
                        <ion-buttons>
                          <ion-button (click)="togglePasswordVisibility()">
                            <ion-icon class="icon lock-icon" [name]="isPasswordVisible ? 'lock-open' : 'lock-closed'"></ion-icon>
                          </ion-button>
                        </ion-buttons>
                      </div>
                      <div class="wave-group">
                        <input required="" [type]="isPasswordVisible ? 'text' : 'password'" class="input-tecido" placeholder="">
                        <label class="label">
                          <span class="label-char" style="--index: 0">N</span>
                          <span class="label-char" style="--index: 1">o</span>
                          <span class="label-char" style="--index: 2">v</span>
                          <span class="label-char" style="--index: 3">a</span>
                          <span class="label-char" style="--index: 5">&nbsp;</span>
                          <span class="label-char" style="--index: 6">S</span>
                          <span class="label-char" style="--index: 7">e</span>
                          <span class="label-char" style="--index: 8">n</span>
                          <span class="label-char" style="--index: 9">h</span>
                          <span class="label-char" style="--index: 10">a</span>
                        </label>
                      </div>
                    </div>
                    <span class="bar"></span>
                  </div>
                </ion-col>
              </ion-row>

              <ion-row class="espacamento">
                <ion-col>
                  <div class="input-barra">
                    <div class="input-texto">
                      <div class="icon-pessoa">
                        <ion-buttons>
                          <ion-button (click)="togglePasswordVisibility1()">
                            <ion-icon class="icon lock-icon" [name]="isPasswordVisible1 ? 'lock-open' : 'lock-closed'"></ion-icon>
                          </ion-button>
                        </ion-buttons>
                      </div>
                      <div class="wave-group">
                        <input required="" [type]="isPasswordVisible1 ? 'text' : 'password'" class="input-tecido" placeholder="">
                        <label class="label">
                          <span class="label-char" style="--index: 0">C</span>
                          <span class="label-char" style="--index: 1">o</span>
                          <span class="label-char" style="--index: 2">n</span>
                          <span class="label-char" style="--index: 3">f</span>
                          <span class="label-char" style="--index: 4">i</span>
                          <span class="label-char" style="--index: 5">r</span>
                          <span class="label-char" style="--index: 6">m</span>
                          <span class="label-char" style="--index: 7">a</span>
                          <span class="label-char" style="--index: 8">r</span>
                          <span class="label-char" style="--index: 9">&nbsp;</span>
                          <span class="label-char" style="--index: 10">S</span>
                          <span class="label-char" style="--index: 11">e</span>
                          <span class="label-char" style="--index: 12">n</span>
                          <span class="label-char" style="--index: 13">h</span>
                          <span class="label-char" style="--index: 14">a</span>
                        </label>
                      </div>
                    </div>
                    <span class="bar"></span>
                  </div>
                </ion-col>
              </ion-row>

              
              <ion-row>
                <ion-col>
                  <div class="div-btEntrar">
                    <ion-button type="submit" class="btEntrar">Enviar</ion-button>
                  </div>
                </ion-col>
              </ion-row>

            
            </ion-grid>
              </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
